<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copiar Chave PIX</title>

<style>

body{
    margin:0;
    background:#fdfaf4;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.caixa{

    background:white;
    padding:45px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    text-align:center;
    max-width:420px;
}

h1{

    color:#b08b32;
    margin-bottom:15px;
}

p{

    color:#555;
    margin-bottom:30px;
}

button{

    background:#b08b32;
    color:white;
    border:none;
    padding:16px 35px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{

    background:#967527;
}

#mensagem{

    margin-top:25px;
    color:green;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="caixa">

<h1>💛 Presenteie com PIX</h1>

<p>Clique no botão abaixo para copiar a chave PIX.</p>

<button onclick="copiarPix()">
📋 Copiar chave PIX
</button>

<div id="mensagem"></div>

</div>

<script>

function copiarPix(){

const chave = "COLE_SUA_CHAVE_PIX_AQUI";

navigator.clipboard.writeText(chave)
.then(function(){

document.getElementById("mensagem").innerHTML =
"✅ Chave PIX copiada com sucesso!";

})
.catch(function(){

document.getElementById("mensagem").innerHTML =
"❌ Não foi possível copiar.";

});

}

</script>

</body>
</html>
